name: CI 🧪

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  checkall:
    name: Format, Lint, Typecheck, Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Python with uv
        uses: ./.github/actions/setup-python-uv

      - name: Run full check suite (format, lint, typecheck, test)
        run: make checkall
